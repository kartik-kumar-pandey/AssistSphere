version: "3.9"

# ============================================================
# AssistSphere — Instance 2 Infrastructure Stack
# ============================================================
# Services: Coturn · Nginx · Prometheus · Grafana · Loki · Promtail
#
# Usage:
#   docker compose up -d          # Start all
#   docker compose ps             # Status
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop all (data persists in volumes)
#   docker compose pull           # Pull latest images
# ============================================================

networks:
  infra:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:

  # ── Coturn ────────────────────────────────────────────────
  # TURN/STUN server for WebRTC NAT traversal.
  # Handles media relay when direct P2P fails.
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    network_mode: host          # TURN needs host networking for UDP media ports
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    environment:
      - DETECT_EXTERNAL_IP=yes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ─────────────────────────────────────────────────
  # Reverse proxy + SSL termination + optional static file serving.
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - infra
    depends_on:
      - grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus ────────────────────────────────────────────
  # Metrics scraping and storage.
  # Scrapes: Node Exporter (system), Instance 1 app metrics, Nginx.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"   # Bind to localhost — exposed via Nginx only
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - infra
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana ───────────────────────────────────────────────
  # Dashboards for Prometheus metrics and Loki logs.
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # Exposed via Nginx only
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LOG_MODE=console
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - infra
    depends_on:
      - prometheus
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Loki ──────────────────────────────────────────────────
  # Log aggregation backend (receives from Promtail, queried by Grafana).
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - infra
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Promtail ──────────────────────────────────────────────
  # Log shipper: tails logs from Instance 1 (via SSH/file) + local Docker logs
  # and pushes them to Loki.
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - infra
    depends_on:
      - loki
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

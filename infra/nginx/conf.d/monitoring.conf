# ============================================================
# Nginx virtual host — Grafana dashboard
# Replace yourdomain.com with your actual domain
# ============================================================

server {
    listen 80;
    server_name monitor.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name monitor.yourdomain.com;

    # TLS (Let's Encrypt — run certbot on Instance 2)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Basic auth — protect Grafana from the public internet
    auth_basic           "AssistSphere Monitoring";
    auth_basic_user_file /etc/nginx/ssl/.htpasswd;

    # Grafana (runs on port 3000 inside Docker)
    location /grafana/ {
        auth_basic off;   # Grafana has its own login
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 600s;
    }

    # Prometheus — protected by basic auth above
    location /prometheus/ {
        proxy_pass         http://prometheus:9090/prometheus/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check (public)
    location /health {
        auth_basic off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

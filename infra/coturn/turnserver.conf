# ============================================================
# Coturn TURN server configuration for AssistSphere
# Deploy on Instance 2 — handles WebRTC media relay
# ============================================================

# Listening ports
listening-port=3478
tls-listening-port=5349

# UDP relay port range (keep this range open in your firewall)
min-port=49152
max-port=65535

# External IP of Instance 2 — replace with your actual public IP
external-ip=INSTANCE2_PUBLIC_IP

# TURN credentials (shared with AssistSphere backend env vars)
# Generate with: openssl rand -hex 16
user=assistsphere:REPLACE_WITH_STRONG_SECRET

# Realm
realm=assistsphere.yourdomain.com

# Security
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# TLS cert (from Let's Encrypt via certbot, or self-signed for testing)
# cert=/etc/letsencrypt/live/yourdomain.com/fullchain.pem
# pkey=/etc/letsencrypt/live/yourdomain.com/privkey.pem

# ============================================================
# Coturn TURN server configuration for AssistSphere
# Instance 2 — handles WebRTC NAT traversal/relay
# ============================================================

# Listening ports
listening-port=3478
tls-listening-port=5349

# UDP relay port range
# IMPORTANT: These ports must be open in Oracle Security List for Instance 2
# They do NOT conflict with mediasoup ports (40000-49999) on Instance 1
# because these ports are on a different machine (Instance 2)
min-port=49152
max-port=65535

# External IP of Instance 2 — replace with your actual public IP
external-ip=129.154.232.98

# TURN credentials
# This secret must match TURN_SECRET in Instance 1's .env
# Generate with: openssl rand -hex 16
user=assistsphere:4ffe72b80ed2f7b82c1f9392c7d5a136

# Realm — can be anything, used for authentication
realm=assistsphere.app

# ── Security ─────────────────────────────────────────────────
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# SSRF Protection — block access to Oracle internal metadata server
# and other internal IP ranges that should never be relay targets
denied-peer-ip=169.254.169.254
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# ── Resource limits (important on 1 GB RAM VM) ───────────────
# Max simultaneous allocations (TURN sessions)
total-quota=100
# Max bandwidth per user (bits/sec) — 1 Mbps per relay
max-bps=1000000
# Allocation timeout in seconds
stale-nonce=600

# ── Logging (stdout — Docker captures this correctly) ────────
# Do NOT use log-file in Docker — container logs go to stdout/stderr
# log-file=/var/log/coturn/turnserver.log  ← broken in Docker, keep commented

# Remove 'verbose' in production (causes excessive log noise)
# verbose

# ── TLS cert (optional — needed only if you have a domain + SSL) ─
# Uncomment after running certbot on Instance 2:
# cert=/etc/letsencrypt/live/yourdomain.com/fullchain.pem
# pkey=/etc/letsencrypt/live/yourdomain.com/privkey.pem
